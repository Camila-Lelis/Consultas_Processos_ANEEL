name: Atualizar dados ANEEL

on:
  schedule:
    # Toda os dias às 17:30 UTC (14:00 horário de Brasília)
    - cron: '30 17 * * *'
  workflow_dispatch:
    # Permite executar manualmente pelo painel do GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Gerar processos_data.js
        run: python scripts/generate_data.py

      - name: Commit e push (somente se houver mudanças)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add processos_data.js index.html
          git diff --staged --quiet || git commit -m "dados: atualização automática ANEEL $(date -u +'%Y-%m-%d')"
          git push
